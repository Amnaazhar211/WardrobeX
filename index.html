
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WardrobeX – Luxury Virtual Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --ink: #0b0b0c;
        --charcoal: #111213;
        --ivory: #f6f2ea;
        --rose: #c18b7a;
        --amber: #d9b27d;
        --mist: rgba(255, 255, 255, 0.06);
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--ink);
        color: var(--ivory);
        font-family: 'Space Grotesk', sans-serif;
        overflow-x: hidden;
      }
      h1, h2, h3, .serif {
        font-family: 'Playfair Display', serif;
      }
      .glass {
        background: rgba(12, 12, 12, 0.65);
        backdrop-filter: blur(14px) saturate(120%);
        border: 1px solid rgba(193, 139, 122, 0.25);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      .text-ivory { color: var(--ivory); }
      .bg-charcoal { background-color: var(--charcoal); }
      .text-rose-gold { color: var(--rose); }
      .bg-rose-gold { background-color: var(--rose); }
      .border-rose-gold { border-color: var(--rose); }
      .luxury-gradient {
        background: linear-gradient(135deg, #151515 0%, #0b0b0c 100%);
      }
      .rose-gold-glow:hover {
        box-shadow: 0 0 18px rgba(193, 139, 122, 0.5);
      }
      .bg-atelier {
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(217, 178, 125, 0.12), transparent 60%),
          radial-gradient(800px 500px at 85% 15%, rgba(193, 139, 122, 0.18), transparent 55%),
          radial-gradient(1000px 800px at 40% 120%, rgba(217, 178, 125, 0.10), transparent 60%),
          var(--ink);
      }
      .grain {
        position: absolute;
        inset: 0;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter><rect width="160" height="160" filter="url(%23n)" opacity="0.07"/></svg>');
        mix-blend-mode: soft-light;
        pointer-events: none;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #121212;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--rose);
        border-radius: 10px;
      }
      @keyframes floaty {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }
    </style>

{

  }
}
</script>
